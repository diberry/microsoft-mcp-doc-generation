name: Test @azure/mcp Update

on:
  pull_request:
    paths:
      - 'mcp-cli-metadata/**'
      - '.github/workflows/update-azure-mcp.yml'
      - '.github/workflows/test-azure-mcp-update.yml'

jobs:
  test-azure-mcp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tracked azmcp version
        run: |
          VERSION=$(tr -d '[:space:]' < mcp-cli-metadata/tracked-version.txt)
          echo "Installing @azure/mcp@$VERSION..."
          npm install -g @azure/mcp@$VERSION

      - name: Test @azure/mcp CLI
        run: |
          echo "Testing @azure/mcp installation..."
          azmcp --version
          azmcp --help
          echo "✅ All tests passed"
