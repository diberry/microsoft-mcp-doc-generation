name: Update @azure/mcp Version

on:
  # Run nightly at 9:00 AM UTC
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-azure-mcp
  cancel-in-progress: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check current and latest versions
        id: version-check
        run: |
          echo "Checking @azure/mcp version..."
          
          # Read the currently tracked version from file
          CURRENT_VERSION=$(cat ./mcp-cli-metadata/tracked-version.txt | tr -d '[:space:]')
          echo "Current tracked version: $CURRENT_VERSION"
          
          # Detect if current version is a pre-release (beta, alpha, rc, etc.)
          if echo "$CURRENT_VERSION" | grep -qiE 'beta|alpha|rc|preview|next'; then
            PRE_TAG=$(echo "$CURRENT_VERSION" | grep -oiE 'beta|alpha|rc|preview|next' | head -1)
            LATEST_VERSION=$(npm view @azure/mcp versions --json | node -p "
              JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))
                .filter(v => v.includes('$PRE_TAG'))
                .pop() || ''")
            if [ -z "$LATEST_VERSION" ]; then
              LATEST_VERSION=$(npm view @azure/mcp version)
            fi
            echo "Pre-release channel detected: $PRE_TAG"
          else
            LATEST_VERSION=$(npm view @azure/mcp version)
          fi
          echo "Latest version: $LATEST_VERSION"
          
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          
          BRANCH_VERSION=$(echo "$LATEST_VERSION" | sed 's/[^a-zA-Z0-9-]/-/g')
          echo "branch_version=$BRANCH_VERSION" >> $GITHUB_OUTPUT
          
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "✅ Update available: $CURRENT_VERSION → $LATEST_VERSION"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "✅ Already up to date at version $CURRENT_VERSION"
          fi

      - name: Install latest azmcp binary
        if: steps.version-check.outputs.needs_update == 'true'
        run: |
          echo "Installing @azure/mcp@${{ steps.version-check.outputs.latest_version }} globally..."
          npm install -g @azure/mcp@${{ steps.version-check.outputs.latest_version }}
          echo "✅ Installed @azure/mcp@${{ steps.version-check.outputs.latest_version }}"

      - name: Test installation
        if: steps.version-check.outputs.needs_update == 'true'
        run: |
          echo "Testing @azure/mcp installation..."
          azmcp --version
          azmcp --help
          echo "✅ Installation test passed"

      - name: Capture CLI version and generate tools list
        if: steps.version-check.outputs.needs_update == 'true'
        id: cli-snapshot
        working-directory: ./mcp-cli-metadata
        run: |
          # Get the CLI version string from the binary itself
          CLI_VERSION=$(azmcp --version | tr -d '[:space:]')
          echo "CLI version: $CLI_VERSION"
          echo "cli_version=$CLI_VERSION" >> $GITHUB_OUTPUT
          
          VERSION_DIR="./$CLI_VERSION"
          
          # Check if this version's folder already exists in the repo
          if [ -d "$VERSION_DIR" ]; then
            echo "is_new=false" >> $GITHUB_OUTPUT
            echo "✅ Folder $VERSION_DIR already exists — skipping snapshot"
          else
            echo "is_new=true" >> $GITHUB_OUTPUT
            mkdir -p "$VERSION_DIR"
            
            # Generate and validate the tools list
            azmcp tools list > "$VERSION_DIR/tools-list.json" 2>/dev/null
            if ! node -e "JSON.parse(require('fs').readFileSync('$VERSION_DIR/tools-list.json','utf8'))" 2>/dev/null; then
              echo "::error::CLI output is not valid JSON"
              cat "$VERSION_DIR/tools-list.json"
              exit 1
            fi
            
            TOOL_COUNT=$(node -p "JSON.parse(require('fs').readFileSync('$VERSION_DIR/tools-list.json','utf8')).results?.length ?? 0")
            echo "✅ Snapshot created: $VERSION_DIR/tools-list.json ($TOOL_COUNT tools)"
          fi

      - name: Diff against previous version
        if: steps.cli-snapshot.outputs.is_new == 'true'
        id: diff-check
        working-directory: ./mcp-cli-metadata
        run: |
          CLI_VERSION="${{ steps.cli-snapshot.outputs.cli_version }}"
          
          # Find all existing version folders (excluding the one we just created)
          # Sort by version using sort -V for natural version ordering
          PREV_VERSION=$(ls -d */ 2>/dev/null \
            | sed 's|/||' \
            | grep -v "^${CLI_VERSION}$" \
            | sort -V \
            | tail -1)
          
          DIFF_FILE="diff-${PREV_VERSION:-none}-to-${CLI_VERSION}.txt"
          
          if [ -n "$PREV_VERSION" ] && [ -f "$PREV_VERSION/tools-list.json" ]; then
            echo "Diffing $PREV_VERSION → $CLI_VERSION"
            echo "previous_version=$PREV_VERSION" >> $GITHUB_OUTPUT
            
            # Generate the diff (|| true because diff exits 1 when files differ)
            diff -u "$PREV_VERSION/tools-list.json" "$CLI_VERSION/tools-list.json" > "$DIFF_FILE" || true
            
            # Count changed lines (additions + deletions, excluding diff headers)
            ADDED=$(grep -c '^+[^+]' "$DIFF_FILE" || echo 0)
            REMOVED=$(grep -c '^-[^-]' "$DIFF_FILE" || echo 0)
            TOTAL=$((ADDED + REMOVED))
            
            echo "lines_added=$ADDED" >> $GITHUB_OUTPUT
            echo "lines_removed=$REMOVED" >> $GITHUB_OUTPUT
            echo "lines_changed=$TOTAL" >> $GITHUB_OUTPUT
            
            # Prepend a summary header to the diff file
            {
              echo "# CLI Tools Diff: $PREV_VERSION → $CLI_VERSION"
              echo "# Lines added:   $ADDED"
              echo "# Lines removed: $REMOVED"
              echo "# Total changed: $TOTAL"
              echo "#"
              cat "$DIFF_FILE"
            } > "${DIFF_FILE}.tmp" && mv "${DIFF_FILE}.tmp" "$DIFF_FILE"
            
            echo "✅ Diff generated: $TOTAL lines changed (+$ADDED / -$REMOVED)"
          else
            echo "previous_version=" >> $GITHUB_OUTPUT
            echo "lines_changed=0" >> $GITHUB_OUTPUT
            echo "# No previous version found to diff against" > "$DIFF_FILE"
            echo "⚠️ No previous version folder found — skipping diff"
          fi
          
          echo "diff_file=$DIFF_FILE" >> $GITHUB_OUTPUT

      - name: Upload diff artifact
        if: steps.cli-snapshot.outputs.is_new == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cli-diff-${{ steps.cli-snapshot.outputs.cli_version }}
          path: mcp-cli-metadata/${{ steps.diff-check.outputs.diff_file }}
          retention-days: 90

      - name: Clone articles repo for gap detection
        if: steps.cli-snapshot.outputs.is_new == 'true'
        id: clone-articles
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --sparse \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/MicrosoftDocs/azure-dev-docs-pr.git \
            articles-repo
          cd articles-repo
          git sparse-checkout set articles/azure-mcp-server/tools
          echo "cloned=true" >> $GITHUB_OUTPUT

      - name: Run MCP tool coverage audit
        if: steps.cli-snapshot.outputs.is_new == 'true'
        id: gap-audit
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $toolsListPath = "./mcp-cli-metadata/${{ steps.cli-snapshot.outputs.cli_version }}/tools-list.json"
          $articlesPath  = "./articles-repo/articles/azure-mcp-server/tools"
          $reportDir     = "./gap-report"
          $jsonOut       = "$reportDir/gap-report.json"

          ./.copilot/skills/azure-ai-tools-mcp-coverage-audit/scripts/Scan-McpToolCoverage.ps1 `
            -ToolsJsonPath $toolsListPath `
            -ArticlesDir   $articlesPath `
            -OutputJson    $jsonOut `
            -ReportDir     $reportDir

          if (Test-Path $jsonOut) {
            $data = Get-Content $jsonOut -Raw | ConvertFrom-Json
            Add-Content $env:GITHUB_OUTPUT "total_tools=$($data.total_tools_in_json)"
            Add-Content $env:GITHUB_OUTPUT "documented_tools=$($data.summary.tools_documented)"
            Add-Content $env:GITHUB_OUTPUT "missing_tools=$($data.summary.tools_missing)"
            Add-Content $env:GITHUB_OUTPUT "params_missing=$($data.summary.params_missing)"
            Add-Content $env:GITHUB_OUTPUT "anno_mismatches=$($data.summary.annotation_mismatches)"
          }

      - name: Upload gap report artifact
        if: steps.cli-snapshot.outputs.is_new == 'true'
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: mcp-gap-report-${{ steps.cli-snapshot.outputs.cli_version }}
          path: ./gap-report/
          if-no-files-found: ignore
          retention-days: 90

      - name: Check for breaking changes
        if: steps.version-check.outputs.needs_update == 'true'
        id: breaking-check
        run: |
          CURRENT_MAJOR=$(echo "${{ steps.version-check.outputs.current_version }}" | cut -d. -f1 | sed 's/[^0-9]//g')
          LATEST_MAJOR=$(echo "${{ steps.version-check.outputs.latest_version }}" | cut -d. -f1 | sed 's/[^0-9]//g')
          
          if [ "$CURRENT_MAJOR" != "$LATEST_MAJOR" ]; then
            echo "breaking=true" >> $GITHUB_OUTPUT
            echo "⚠️ MAJOR VERSION CHANGE DETECTED - Review breaking changes!"
          else
            echo "breaking=false" >> $GITHUB_OUTPUT
            echo "✅ No major version change"
          fi

      - name: Block breaking changes from auto-commit
        if: steps.version-check.outputs.needs_update == 'true' && steps.breaking-check.outputs.breaking == 'true'
        run: |
          echo "::error::Breaking change detected (major version bump)"
          echo "::error::Major version updates require manual review and approval"
          echo "::error::Please create a PR manually with: gh pr create --fill"
          exit 1

      - name: Update tracked version file
        if: steps.version-check.outputs.needs_update == 'true'
        run: |
          echo "${{ steps.version-check.outputs.latest_version }}" > mcp-cli-metadata/tracked-version.txt
          echo "✅ Updated tracked-version.txt to ${{ steps.version-check.outputs.latest_version }}"

      - name: Configure Git
        if: steps.version-check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push Changes
        if: steps.version-check.outputs.needs_update == 'true'
        id: commit-push
        run: |
          echo "Committing changes to main branch..."
          
          # Stage the updated tracked version file
          git add mcp-cli-metadata/tracked-version.txt
          
          # Stage the new CLI snapshot if it exists
          if [ "${{ steps.cli-snapshot.outputs.is_new }}" == "true" ]; then
            VERSION_DIR="mcp-cli-metadata/${{ steps.cli-snapshot.outputs.cli_version }}"
            if [ -d "$VERSION_DIR" ] && [ "$(ls -A $VERSION_DIR 2>/dev/null)" ]; then
              git add "$VERSION_DIR/"
            else
              echo "::error::Version directory is missing or empty: $VERSION_DIR"
              exit 1
            fi
          fi
          
          # Stage the diff file if it exists
          if [ -f "mcp-cli-metadata/${{ steps.diff-check.outputs.diff_file }}" ]; then
            git add "mcp-cli-metadata/${{ steps.diff-check.outputs.diff_file }}"
          fi
          
          # Create commit message
          COMMIT_MSG="chore(deps): update @azure/mcp to ${{ steps.version-check.outputs.latest_version }}

Automated update from nightly version check workflow.

- Package: @azure/mcp
- Previous Version: ${{ steps.version-check.outputs.current_version }}
- New Version: ${{ steps.version-check.outputs.latest_version }}
- CLI Version: ${{ steps.cli-snapshot.outputs.cli_version }}"

          if [ "${{ steps.cli-snapshot.outputs.is_new }}" == "true" ]; then
            COMMIT_MSG="$COMMIT_MSG

Files updated:
- mcp-cli-metadata/tracked-version.txt
- mcp-cli-metadata/${{ steps.cli-snapshot.outputs.cli_version }}/tools-list.json (new)"
          else
            COMMIT_MSG="$COMMIT_MSG

Files updated:
- mcp-cli-metadata/tracked-version.txt"
          fi

          if [ -n "${{ steps.diff-check.outputs.previous_version }}" ]; then
            COMMIT_MSG="$COMMIT_MSG

CLI diff: ${{ steps.diff-check.outputs.previous_version }} → ${{ steps.cli-snapshot.outputs.cli_version }}
- Lines changed: ${{ steps.diff-check.outputs.lines_changed }}
- Added: ${{ steps.diff-check.outputs.lines_added }}
- Removed: ${{ steps.diff-check.outputs.lines_removed }}"
          fi

          # Commit with error handling
          if ! git commit -m "$COMMIT_MSG"; then
            echo "::error::Failed to create commit - check if there are any changes to commit"
            exit 1
          fi
          
          # Detect conflicts before pushing
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "::error::main branch has diverged - another commit was pushed during workflow"
            echo "::error::Please retry workflow manually"
            exit 1
          fi
          
          # Push with error handling
          if ! git push origin HEAD:main; then
            echo "::error::Failed to push to main - check branch protection rules and permissions"
            exit 1
          fi
          
          echo "✅ Changes committed and pushed to main"
          echo "committed=true" >> $GITHUB_OUTPUT

      - name: Summary
        if: always()
        run: |
          echo "## Update Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Current Version**: ${{ steps.version-check.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest Version**: ${{ steps.version-check.outputs.latest_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Update Needed**: ${{ steps.version-check.outputs.needs_update }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.commit-push.outputs.committed }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Changes committed and pushed to main" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.version-check.outputs.needs_update }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Update was needed but commit failed — check logs" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ No update needed — already using the latest version" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.cli-snapshot.outputs.is_new }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### CLI Snapshot" >> $GITHUB_STEP_SUMMARY
            echo "- **CLI Version**: ${{ steps.cli-snapshot.outputs.cli_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Snapshot**: \`mcp-cli-metadata/${{ steps.cli-snapshot.outputs.cli_version }}/tools-list.json\`" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ steps.diff-check.outputs.previous_version }}" ]; then
              echo "- **Diff**: ${{ steps.diff-check.outputs.previous_version }} → ${{ steps.cli-snapshot.outputs.cli_version }} — **${{ steps.diff-check.outputs.lines_changed }} lines changed**" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::@azure/mcp update workflow failed - check logs for details"

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = '❌ @azure/mcp Update Workflow Failed';
            const workflowUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            // Check for existing open issue to avoid duplicates
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'bug,automated',
              state: 'open',
              per_page: 10
            });
            const duplicate = existingIssues.find(i => i.title === issueTitle);
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Workflow failed again.\n\n**Workflow Run:** ${workflowUrl}`
              });
              return;
            }
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: `The automated @azure/mcp update workflow failed.\n\n**Workflow Run:** ${workflowUrl}\n\nPlease check the logs for details.`,
              labels: ['bug', 'automated']
            });
