name: Build and Test

on:
  push:
    branches: [main]
    paths:
      - 'mcp-tools/**'
      - 'shared/**'
      - 'mcp-doc-generation.sln'
      - 'skills-generation/**'
      - 'start-azure-skills.sh'
      - 'mcp-cli-metadata/**'
      - '.github/workflows/build-and-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mcp-tools/**'
      - 'shared/**'
      - 'mcp-doc-generation.sln'
      - 'skills-generation/**'
      - 'start-azure-skills.sh'
      - 'mcp-cli-metadata/**'
      - '.github/workflows/build-and-test.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore mcp-doc-generation.sln

      - name: Build solution
        run: dotnet build mcp-doc-generation.sln --no-restore --configuration Release

      - name: Run tests
        # The fast PR gate runs deterministic unit/contract tests only. Environment-dependent
        # categories (E2E, Smoke/SmokeTest, RequiresGeneration) require real generation output
        # or a full pipeline run and are covered by a separate generation-dependent job.
        # Tracking: https://github.com/diberry/microsoft-mcp-doc-generation/issues/710
        run: dotnet test mcp-doc-generation.sln --no-build --configuration Release --verbosity normal --filter "Category!=E2E&Category!=Smoke&Category!=SmokeTest&Category!=RequiresGeneration"

  generation-dependent-tests:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore mcp-doc-generation.sln

      - name: Build solution
        run: dotnet build mcp-doc-generation.sln --no-restore --configuration Release

      - name: Generate isolated advisor output
        id: generate
        continue-on-error: true
        run: |
          mkdir -p "$RUNNER_TEMP/docgen-output"
          bash ./start.sh advisor --output "$RUNNER_TEMP/docgen-output/generated-advisor"

      - name: Run generation-dependent tests
        if: always()
        continue-on-error: true
        env:
          DOCGEN_GENERATED_OUTPUT_ROOT: ${{ runner.temp }}/docgen-output
        run: dotnet test mcp-doc-generation.sln --no-build --configuration Release --verbosity normal --filter "Category=E2E|Category=Smoke|Category=SmokeTest|Category=RequiresGeneration"

  pester-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -MinimumVersion '5.0.0' -MaximumVersion '5.99.99' -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run validation Pester tests
        shell: pwsh
        run: Invoke-Pester -Path ./mcp-tools/validation/tests -Output Detailed -CI

  vale-lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Vale
        run: |
          wget -qO- https://github.com/errata-ai/vale/releases/download/v3.9.5/vale_3.9.5_Linux_64-bit.tar.gz | tar xz -C /usr/local/bin vale

      - name: Validate Vale config
        run: vale --config mcp-tools/.vale.ini ls-config

      - name: Create sample markdown for lint check
        run: |
          mkdir -p vale-sample-output
          # If generated output exists, sample it; otherwise create a minimal test
          if [ -d generated/multi-page ] && [ "$(ls generated/multi-page/*.md 2>/dev/null | head -5)" ]; then
            cp $(ls generated/multi-page/*.md | head -20) vale-sample-output/
          else
            cat > vale-sample-output/sample.md << 'EOF'
          ---
          title: Sample Tool Reference
          ms.topic: reference
          ms.date: 4/2/2026
          ---

          # Sample tool reference

          This article describes a sample Azure MCP tool for validation purposes.
          EOF
          fi

      - name: Run Vale lint
        run: vale --config mcp-tools/.vale.ini vale-sample-output/ || true
